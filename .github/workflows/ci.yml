name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            preset: gcc-debug
            test_preset: all-gcc-debug
          - compiler: gcc
            preset: gcc-release
            test_preset: ""
          - compiler: clang
            preset: clang-debug
            test_preset: all-clang-debug

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install toolchain and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            cmake \
            ccache \
            gcc \
            g++ \
            clang \
            libgtest-dev \
            libbenchmark-dev

      - name: Select compiler
        run: |
          if [[ "${{ matrix.compiler }}" == "clang" ]]; then
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          else
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          fi

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake', 'CMakePresets.json') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.preset }}-

      - name: Print versions
        run: |
          cmake --version
          $CC --version
          $CXX --version
          ccache --version || true

      - name: Configure
        run: |
          ccache --zero-stats || true
          cmake --preset ${{ matrix.preset }} \
            -D CMAKE_C_COMPILER="$CC" \
            -D CMAKE_CXX_COMPILER="$CXX" \
            -D CMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j"$(nproc)"

      - name: Test
        if: matrix.test_preset != ''
        run: ctest --preset ${{ matrix.test_preset }} --output-on-failure

      - name: ccache stats
        if: always()
        run: ccache --show-stats || true

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.preset }}
          path: |
            **/Testing/**/*.xml
            **/CTest*.txt
            **/LastTest.log

  msvc-debug:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up MSVC developer environment
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install Ninja
        shell: pwsh
        run: choco install ninja -y

      - name: Print versions
        shell: pwsh
        run: |
          cmake --version
          cl

      - name: Configure
        shell: pwsh
        run: |
          cmake --preset msvc-debug -D BUILD_TESTING=OFF

      - name: Build
        shell: pwsh
        run: |
          cmake --build --preset msvc-debug
